<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para o amor da minha vida 💖</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!--
    SITE PRESENTE PARA A MANU 💖
    Feito em HTML, CSS e JavaScript.

    COMO EDITAR:
    1. Abra o arquivo script.js.
    2. Procure por "EDITE AQUI".
    3. Troque os textos, links e nomes.
    4. Se quiser colocar fotos, coloque imagens na pasta "imagens" e edite os caminhos no script.js.
  -->

  <main class="page">
    <section class="iphone">
      <div class="notch"></div>

      <div class="screen">
        <header class="status-bar">
          <span>22:05</span>
          <span>♡ Wi‑Fi 🔋</span>
        </header>

        <section id="homeScreen" class="home-screen active">
          <div class="welcome">
            <p>iPhone do Amor</p>
            <h1>Para a Manu 💖</h1>
          </div>

          <div class="apps-grid">
            <button class="app" data-app="amor">
              <span class="icon heart">❤️</span>
              <small>Amor</small>
            </button>

            <button class="app" data-app="cartinhas">
              <span class="icon letter">💌</span>
              <small>Cartinhas</small>
            </button>

            <button class="app" data-app="motivos">
              <span class="icon rose">🌹</span>
              <small>Motivos</small>
            </button>

            <button class="app" data-app="musica">
              <span class="icon music">🎵</span>
              <small>Música</small>
            </button>

            <button class="app" data-app="datas">
              <span class="icon calendar">📅</span>
              <small>Datas</small>
            </button>

            <button class="app" data-app="segredo">
              <span class="icon lock">🔒</span>
              <small>Segredo</small>
            </button>

            <button class="app" data-app="video">
              <span class="icon video">🎬</span>
              <small>Vídeo</small>
            </button>
          </div>

          <footer class="dock">
            <button class="dock-app">💕</button>
            <button class="dock-app">🌙</button>
            <button class="dock-app">✨</button>
            <button class="dock-app">🫶</button>
          </footer>
        </section>

        <section id="appScreen" class="app-screen">
          <div class="app-top">
            <button id="backButton" class="back-button">‹ Voltar</button>
            <h2 id="appTitle">App</h2>
          </div>

          <div id="appContent" class="app-content"></div>
        </section>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
